name: SEO and marketing cron

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  publish-seo-and-social:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger InmoRadar SEO cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: https://www.inmoradar.app
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error title=Missing CRON_SECRET::Falta el secret CRON_SECRET en GitHub Actions. Anadelo en Settings > Secrets and variables > Actions > New repository secret y usa el mismo valor que en Vercel."
            exit 1
          fi
          curl --fail-with-body \
            --retry 2 \
            --retry-delay 5 \
            --request POST \
            --header "x-cron-secret: $CRON_SECRET" \
            "$SITE_URL/api/admin?resource=seo-autogenerate/run"

      - name: Trigger InmoRadar LinkedIn daily draft
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: https://www.inmoradar.app
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error title=Missing CRON_SECRET::Falta el secret CRON_SECRET en GitHub Actions. Anadelo en Settings > Secrets and variables > Actions > New repository secret y usa el mismo valor que en Vercel."
            exit 1
          fi
          response="$(curl --fail-with-body \
            --silent \
            --show-error \
            --retry 2 \
            --retry-delay 5 \
            --request POST \
            --header "x-cron-secret: $CRON_SECRET" \
            "$SITE_URL/api/admin?resource=linkedin/daily")"
          echo "$response"
          if echo "$response" | grep -q '"ok":false'; then
            echo "::error title=LinkedIn cron failed::El endpoint de LinkedIn devolvio ok=false. Revisa el log anterior."
            exit 1
          fi

      - name: Trigger InmoRadar Meta autopublisher
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: https://www.inmoradar.app
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error title=Missing CRON_SECRET::Falta el secret CRON_SECRET en GitHub Actions. Anadelo en Settings > Secrets and variables > Actions > New repository secret y usa el mismo valor que en Vercel."
            exit 1
          fi
          response="$(curl --fail-with-body \
            --silent \
            --show-error \
            --retry 2 \
            --retry-delay 5 \
            --request POST \
            --header "x-cron-secret: $CRON_SECRET" \
            "$SITE_URL/api/admin?resource=meta/daily")"
          echo "$response"
          if echo "$response" | grep -q '"ok":false'; then
            echo "::error title=Meta cron failed::El endpoint de Meta devolvio ok=false. Revisa el log anterior."
            exit 1
          fi
