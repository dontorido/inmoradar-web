name: SEO landing cron

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  publish-seo-landing:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger InmoRadar SEO cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: https://www.inmoradar.app
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error title=Missing CRON_SECRET::Falta el secret CRON_SECRET en GitHub Actions. Añádelo en Settings > Secrets and variables > Actions > New repository secret y usa el mismo valor que en Vercel."
            exit 1
          fi
          curl --fail-with-body \
            --retry 2 \
            --retry-delay 5 \
            --request POST \
            --header "x-cron-secret: $CRON_SECRET" \
            "$SITE_URL/api/cron/seo-publish"
